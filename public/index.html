<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Huntrix OS Ultra</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#0f0f0f,#1a1a2e);
    color: white;
}

/* Top bar */
.topbar {
    background: #111;
    padding: 10px;
    text-align: center;
}

/* Apps */
.apps {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 15px;
    padding: 20px;
}

.app {
    background: #222;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
}

.app:hover {
    transform: scale(1.1);
    background: #333;
}

/* Window */
.window {
    position: fixed;
    top: 10%;
    left: 10%;
    width: 80%;
    height: 70%;
    background: #111;
    border-radius: 15px;
    display: none;
    flex-direction: column;
}

.window-header {
    background: #222;
    padding: 10px;
    display: flex;
    justify-content: space-between;
}

.close {
    cursor: pointer;
    color: red;
}

.content {
    padding: 15px;
    flex: 1;
}

button {
    padding: 10px;
    margin: 5px;
    background: #00ffcc;
    border: none;
    cursor: pointer;
    border-radius: 8px;
}

h2,h3 {
    margin: 5px 0;
}
</style>
</head>

<body>

<div class="topbar">🔥 Huntrix OS Ultra Pro Max</div>

<div class="apps">
    <div class="app" onclick="openApp('clicker')">🎮 Clicker</div>
    <div class="app" onclick="openApp('store')">🛒 Store</div>
    <div class="app" onclick="openApp('notes')">📝 Notes</div>
    <div class="app" onclick="openApp('about')">⚙️ About</div>
</div>

<div class="window" id="window">
    <div class="window-header">
        <span id="title">App</span>
        <span class="close" onclick="closeApp()">✖</span>
    </div>
    <div class="content" id="content"></div>
</div>

<script>
let points = parseInt(localStorage.getItem("points")) || 0;
let power = parseInt(localStorage.getItem("power")) || 1;
let auto = parseInt(localStorage.getItem("auto")) || 0;

/* AUTO INCOME */
setInterval(() => {
    points += auto;
    saveGame();
}, 1000);

/* OPEN APPS */
function openApp(app) {
    let w = document.getElementById("window");
    let t = document.getElementById("title");
    let c = document.getElementById("content");

    w.style.display = "flex";

    if(app==="clicker"){
        t.innerText="Huntrix Clicker 🎮";
        c.innerHTML=`
        <h2>Points: <span id="points">${points}</span></h2>
        <button onclick="clickPoints()">🔥 CLICK 🔥</button>
        <p>Power: ${power}</p>
        <p>Auto/sec: ${auto}</p>
        `;
    }

    if(app==="store"){
        t.innerText="Huntrix Store 🛒";
        c.innerHTML=`
        <h3>Points: ${points}</h3>
        <button onclick="buy(10,1,'power')">+1 Power (10)</button>
        <button onclick="buy(50,5,'power')">+5 Power (50)</button>
        <button onclick="buy(100,1,'auto')">+1 Auto/sec (100)</button>
        `;
    }

    if(app==="notes"){
        t.innerText="Notes";
        c.innerHTML=`
        <textarea id="noteArea"></textarea>
        <button onclick="saveNote()">Save</button>
        `;
    }

    if(app==="about"){
        t.innerText="About";
        c.innerHTML=`<h2>Huntrix OS 🔥</h2><p>Ultra Version 😎</p>`;
    }
}

/* CLICK */
function clickPoints(){
    points += power;
    document.getElementById("points").innerText = points;
    saveGame();
}

/* STORE */
function buy(cost,val,type){
    if(points>=cost){
        points-=cost;
        if(type==="power") power+=val;
        if(type==="auto") auto+=val;
        saveGame();
        openApp("store");
    } else alert("Not enough ❌");
}

/* SAVE */
function saveGame(){
    localStorage.setItem("points",points);
    localStorage.setItem("power",power);
    localStorage.setItem("auto",auto);
}

/* NOTES */
function saveNote(){
    let text=document.getElementById("noteArea").value;
    localStorage.setItem("note",text);
    alert("Saved!");
}

function closeApp(){
    document.getElementById("window").style.display="none";
}
</script>

</body>
</html>
