<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 text-white flex justify-center items-center h-screen">

<div class="w-[450px] bg-gray-900 p-6 rounded-xl">

    <h1 class="text-blue-400 text-xl text-center">
        ☁️ Huntrix Cloud Dashboard
    </h1>

    <input id="project"
        class="w-full mt-4 p-2 bg-gray-800 rounded"
        placeholder="Project name">

    <button onclick="build()"
        class="w-full mt-3 bg-blue-500 p-2 rounded font-bold">
        🚀 Build APK
    </button>

    <p id="out" class="mt-3 text-green-400"></p>

</div>

<script>
async function build() {
    const token = localStorage.getItem("token");
    const project = document.getElementById("project").value;

    const res = await fetch("/build", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ token, project })
    });

    const data = await res.json();

    document.getElementById("out").innerText =
        "Status: " + data.status;
}
</script>

</body>
</html>
