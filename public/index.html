<!DOCTYPE html>
<html>
<head>
    <title>Login - Huntrix Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black flex items-center justify-center h-screen">

<div class="bg-gray-900 p-6 rounded-xl w-80">

    <h1 class="text-white text-xl text-center mb-4">
        🔐 Huntrix Login
    </h1>

    <input id="user" placeholder="Username"
        class="w-full p-2 mb-2 bg-gray-800 text-white rounded">

    <input id="pass" type="password" placeholder="Password"
        class="w-full p-2 mb-2 bg-gray-800 text-white rounded">

    <button onclick="login()"
        class="w-full bg-green-500 p-2 rounded text-black font-bold">
        Login
    </button>

    <p id="msg" class="text-red-400 mt-2 text-center"></p>

</div>

<script>
async function login() {
    const username = document.getElementById("user").value;
    const password = document.getElementById("pass").value;

    const res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (data.status === "success") {
        localStorage.setItem("token", data.token);
        window.location.href = "/dashboard";
    } else {
        document.getElementById("msg").innerText = "❌ Login failed";
    }
}
</script>

</body>
</html>
