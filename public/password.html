<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 flex items-center justify-center h-screen">

<div class="bg-gray-900 p-6 rounded-xl w-80">

    <h1 class="text-white text-xl text-center mb-4">🔐 Change Password</h1>

    <input id="oldpass" type="password" placeholder="Old Password"
        class="w-full p-2 mb-2 bg-gray-800 text-white rounded">

    <input id="newpass" type="password" placeholder="New Password"
        class="w-full p-2 mb-2 bg-gray-800 text-white rounded">

    <button onclick="changePassword()"
        class="w-full bg-green-500 p-2 rounded font-bold">
        Update Password
    </button>

    <p id="msg" class="text-yellow-400 mt-3 text-center"></p>

</div>

<script>
async function changePassword() {
    const token = localStorage.getItem("token");
    const oldPassword = document.getElementById("oldpass").value;
    const newPassword = document.getElementById("newpass").value;

    const res = await fetch("/change-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, oldPassword, newPassword })
    });

    const data = await res.json();

    document.getElementById("msg").innerText =
        "Status: " + data.status;
}
</script>

</body>
</html>
