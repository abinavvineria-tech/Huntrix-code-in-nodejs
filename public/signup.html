<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black flex items-center justify-center h-screen">

<div class="bg-gray-900 p-6 rounded-xl w-80">

    <h1 class="text-white text-xl text-center mb-4">🆕 Signup</h1>

    <input id="username" placeholder="Username"
        class="w-full p-2 mb-2 bg-gray-800 text-white rounded">

    <input id="password" type="password" placeholder="Password"
        class="w-full p-2 mb-2 bg-gray-800 text-white rounded">

    <button onclick="signup()"
        class="w-full bg-blue-500 p-2 rounded font-bold">
        Create Account
    </button>

    <p id="msg" class="text-green-400 mt-3 text-center"></p>

</div>

<script>
async function signup() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    document.getElementById("msg").innerText =
        "Status: " + data.status;
}
</script>

</body>
</html>
